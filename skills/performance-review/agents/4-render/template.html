<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{name}} — Performance Review — {{period}}</title>
<style>
  :root {
    --bg: #0f1115; --card: #171a21; --line: #272b35; --text: #e6e8ee;
    --muted: #9aa3b2; --green: #3fb950; --amber: #d29922; --red: #f85149; --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; color: var(--text);
         background: radial-gradient(1200px 760px at 50% -8%, #1d2634 0%, var(--bg) 58%) fixed, var(--bg);
         font: 15px/1.55 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 28px; }
  .header { display: flex; gap: 26px; align-items: center; margin-bottom: 30px; }
  .avatar-wrap { width: 120px; height: 120px; flex: none; }
  .avatar { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--line);
            box-shadow: 0 6px 24px rgba(0,0,0,.45); }
  h1 { font-size: 38px; line-height: 1.1; margin: 0 0 6px; letter-spacing: -.02em; font-weight: 700; }
  .role { color: var(--text); font-size: 17px; font-weight: 600; }
  .period { color: var(--muted); font-size: 14px; margin-top: 2px; }
  /* rating badge (clickable → summary node) */
  .badge { display: inline-flex; align-items: center; gap: 8px; margin: 0 0 14px; line-height: 1;
           padding: 9px 16px 7px; border-radius: 999px; font-size: 12.5px; font-weight: 700;
           text-transform: uppercase; letter-spacing: .06em; cursor: pointer; border: 1px solid; }
  .badge .pulse { width: 8px; height: 8px; background: currentColor; }
  .badge .pulse::after { box-shadow: 0 0 0 2px currentColor; }
  .badge.meets   { color: var(--accent); border-color: rgba(88,166,255,.45);  background: rgba(88,166,255,.12); }
  .badge.exceeds { color: var(--green);  border-color: rgba(63,185,80,.45);   background: rgba(63,185,80,.12); }
  .badge.enables { color: #7ee787;       border-color: rgba(126,231,135,.45); background: rgba(126,231,135,.12); }
  .headline { position: relative; border-radius: 22px; margin: 0; width: 100%; max-width: 1200px;
              padding: 48px 56px;
              background: linear-gradient(160deg, #1b202b 0%, var(--card) 60%);
              border: 1px solid rgba(255,255,255,.07);
              box-shadow: 0 30px 90px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
              display: flex; gap: 64px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .headline-main { flex: 1 1 440px; min-width: 0; }
  .summary { font-size: 19px; line-height: 1.5; color: #d7dbe4; max-width: 600px; }
  .counts { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 22px; }
  .chip { display: inline-flex; align-items: center; line-height: 1; padding: 7px 13px 5px; border-radius: 999px;
          border: 1px solid var(--line); background: rgba(255,255,255,.025); color: var(--muted); font-size: 13px; }
  .chip b { color: var(--text); font-weight: 700; margin-right: 5px; }
  a { color: var(--accent); text-decoration: none; } a:hover { text-decoration: underline; }
  /* pulsing click affordance (the only clickable things on the page) */
  .pulse { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); position: relative; cursor: pointer; flex: none; }
  .pulse::after { content: ""; position: absolute; inset: 0; border-radius: 50%; box-shadow: 0 0 0 2px var(--accent); animation: pulsering 2s ease-out infinite; }
  @keyframes pulsering { 0% { transform: scale(.75); opacity: .6; } 100% { transform: scale(2.4); opacity: 0; } }
  .apulse-dot { cursor: pointer; }
  /* radar */
  .radar { flex: 0 1 460px; min-width: 280px; position: relative; }
  .radar svg { width: 100%; height: auto; overflow: visible; display: block; }
  .radar .axis-label { fill: var(--muted); font-size: 13px; font-weight: 600; }
  .radar .score { filter: drop-shadow(0 0 8px rgba(88,166,255,.45)); }
  /* graph drill-down panel (static machinery) */
  .gnav { cursor: pointer; }
  #gscrim { position: fixed; inset: 0; background: rgba(0,0,0,.55); opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 40; }
  #gpanel { position: fixed; top: 50%; left: 50%; width: 660px; max-width: 92vw; height: min(85vh, 640px); background: var(--card);
            border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 18px 56px rgba(0,0,0,.55);
            transform: translate(-50%, -48%) scale(.98); opacity: 0; pointer-events: none;
            transition: opacity .15s ease, transform .15s ease; z-index: 41; display: flex; flex-direction: column; overflow: hidden; }
  body.gopen #gscrim { opacity: 1; pointer-events: auto; }
  body.gopen #gpanel { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
  #gcrumb { padding: 13px 18px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.02);
            font-size: 12px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  #gcrumb a { cursor: pointer; color: var(--accent); } #gcrumb .sep { color: #3a4150; }
  #gclose { margin-left: auto; cursor: pointer; color: var(--muted); font-size: 20px; line-height: 1; padding: 0 4px; }
  #gclose:hover { color: var(--text); }
  #gbody { padding: 22px 26px 26px; overflow: auto; flex: 1; min-height: 0; }
  .gh-type { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
  .gh-title { font-size: 21px; font-weight: 700; line-height: 1.25; letter-spacing: -.01em; margin: 5px 0 0; }
  .gh-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .gstat { display: inline-flex; align-items: center; line-height: 1; padding: 6px 11px 5px; border-radius: 999px;
           border: 1px solid var(--line); background: rgba(255,255,255,.025); font-size: 12px; color: var(--muted); }
  .gstat b { color: var(--text); font-weight: 700; margin-right: 5px; }
  .gbadge { display: inline-flex; align-items: center; line-height: 1; padding: 6px 11px 5px; border-radius: 999px;
            font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; border: 1px solid; flex: none; }
  .gb-below   { color: var(--red);    border-color: rgba(248,81,73,.45);   background: rgba(248,81,73,.12); }
  .gb-meets   { color: var(--accent); border-color: rgba(88,166,255,.45);  background: rgba(88,166,255,.12); }
  .gb-exceeds { color: var(--green);  border-color: rgba(63,185,80,.45);   background: rgba(63,185,80,.12); }
  .gb-enables { color: #7ee787;       border-color: rgba(126,231,135,.45); background: rgba(126,231,135,.12); }
  .gh-role, .gh-date { font-size: 12.5px; color: var(--muted); margin-top: 10px; }
  .gh-text { font-size: 15px; line-height: 1.6; color: #cfd4de; margin-top: 16px; }
  .gsec { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin: 24px 0 10px; }
  .gedge { display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin: 8px 0; border: 1px solid var(--line);
           border-radius: 10px; cursor: pointer; background: rgba(255,255,255,.02);
           transition: border-color .12s ease, background .12s ease; }
  .gedge:hover { border-color: var(--accent); background: rgba(88,166,255,.07); }
  a.gedge { color: var(--text); } a.gedge:hover { text-decoration: none; }
  .gedge .ec { flex: 1; min-width: 0; }
  .gedge .et { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .gedge .el { font-weight: 600; font-size: 14px; margin: 3px 0 2px; }
  .gedge .ew { font-size: 12.5px; color: var(--muted); }
  .gedge .echev { color: var(--muted); font-size: 20px; flex: none; line-height: 1; }
  .gleaf { display: inline-flex; align-items: center; gap: 6px; margin-top: 18px; padding: 9px 15px; border-radius: 9px;
           border: 1px solid var(--line); color: var(--accent); font-size: 13px; font-weight: 600; }
  .gleaf:hover { border-color: var(--accent); background: rgba(88,166,255,.08); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Jinja2 template. render.py fills it from the graph + the person details, supplying:
       name, role, period, gh; rating_class, rating_text (from the summary node's grade); summary; counts (per type);
       axes (six, each with its score-point x/y); graph_json (the whole graph, embedded for the panel).
       The page is JUST this top section — identity · rating · summary · radar; everything else is reached
       by clicking a pulsing dot. The drill-down panel + JS below are static and walk the embedded graph. -->

  <div class="headline">
    <div class="headline-main">
      <div class="header">
        <div class="avatar-wrap">
          <img class="avatar" src="https://github.com/{{gh}}.png" alt="{{name}}">
        </div>
        <div>
          <h1>{{name}}</h1>
          <div class="role">{{role}}</div>
          <div class="period">{{period}} review</div>
        </div>
      </div>
      <!-- rating badge at the top of the summary block ← the `summary` node's grade (class+text by tier) -->
      <div><span class="badge {{rating_class}}" data-node="summary"><span class="pulse"></span>{{rating_text}}</span></div>
      <!-- summary ← the `summary` node .text (the rating badge above opens the node) -->
      <div class="summary">{{summary}}</div>
      <div class="counts">
        <span class="chip"><b>{{counts.commits}}</b> commits</span>
        <span class="chip"><b>{{counts.prs}}</b> PRs</span>
        <span class="chip"><b>{{counts.peer}}</b> peer reviews</span>
        <span class="chip"><b>{{counts.jira}}</b> Jira comments</span>
        <span class="chip"><b>{{counts.tickets}}</b> tickets filed</span>
      </div>
    </div>
    <div class="radar">
      <!-- N-GON radar, one vertex per axis clockwise from the top. render.py computes all
           geometry from the axis order (centre {{cx}},{{cy}}, R=120): rings (concentric grids),
           spokes (centre→vertex), per-axis label position/anchor, and each axis's score point.
           point = centre + (score/100)·(vertex−centre). Each axis's pulsing dot carries
           data-node="axis:<key>" → click opens that axis. -->
      <svg viewBox="-40 -6 400 322" role="img" aria-label="Rating radar">
        {% for r in rings %}<polygon points="{{ r }}" fill="none" stroke="{{ '#3a4150' if loop.last else '#272b35' }}"/>
        {% endfor %}{% for s in spokes %}<line x1="{{cx}}" y1="{{cy}}" x2="{{ s.x }}" y2="{{ s.y }}" stroke="#3a4150"/>
        {% endfor %}<polygon class="score" points="{% for a in axes %}{{ a.x }},{{ a.y }} {% endfor %}" fill="rgba(88,166,255,.22)" stroke="#58a6ff" stroke-width="2.5"/>
        {% for a in axes %}<text class="axis-label" x="{{ a.lx }}" y="{{ a.ly }}" text-anchor="{{ a.anchor }}">{{ a.label }}</text>
        {% endfor %}
        <!-- one PULSING CLICKABLE dot per axis at its score point — the only clickable things on the radar -->
        {% for a in axes %}<circle cx="{{ a.x }}" cy="{{ a.y }}" r="6" fill="none" stroke="#58a6ff" stroke-width="1.5" pointer-events="none"><animate attributeName="r" values="6;15" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".55;0" dur="2s" repeatCount="indefinite"/></circle>
        <circle class="apulse-dot" data-node="axis:{{ a.key }}" cx="{{ a.x }}" cy="{{ a.y }}" r="6" fill="#58a6ff"/>
        {% endfor %}
      </svg>
    </div>
  </div>

</div>

<!-- ===== drill-down panel + graph (static; do not edit per-run except the embedded graph) ===== -->
<div id="gscrim"></div>
<aside id="gpanel" aria-label="Provenance"><div id="gcrumb"><span id="gtrail"></span><span id="gclose" title="Close">×</span></div><div id="gbody"></div></aside>
<script id="graph" type="application/json">{{ graph_json|safe }}</script>
<script>
(function(){
  var G = JSON.parse(document.getElementById('graph').textContent);
  var N = {}; G.nodes.forEach(function(n){ N[n.id]=n; });
  var OUT = {}; G.edges.forEach(function(e){ (OUT[e.from]=OUT[e.from]||[]).push(e); });
  var stack = [];
  var TYPE_LABEL = {pull_request:'pull request', review_comment:'review comment', jira_comment:'jira comment',
    created_ticket:'filed ticket', commit:'commit', comment:'comment', work_item:'work item',
    radar_axis:'radar axis', finding:'finding', summary:'summary', lpp_ticket:'LPP ticket', brian_review:'Brian review'};
  function tl(t){ return t.indexOf('review:')===0 ? 'pr review ('+t.slice(7)+')' : (TYPE_LABEL[t]||t); }
  function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':s; return d.innerHTML; }
  function gradeClass(g){ return {below:'gb-below',meets:'gb-meets',exceeds:'gb-exceeds','exceeds-enables':'gb-enables'}[g] || 'gb-meets'; }
  function gbadge(g){ return '<span class="gbadge '+gradeClass(g)+'">'+esc(g)+'</span>'; }
  function render(){
    var id = stack[stack.length-1], nd = N[id]; if(!nd) return;
    document.getElementById('gtrail').innerHTML = stack.map(function(sid,i){
      return i===stack.length-1 ? '<b>'+esc(N[sid].label.slice(0,24))+'</b>' : '<a data-i="'+i+'">'+esc(N[sid].label.slice(0,18))+'</a>';
    }).join('<span class="sep"> ▸ </span>');
    var h = '<div class="gh-type">'+esc(tl(nd.type))+'</div><div class="gh-title">'+esc(nd.label)+'</div>';
    var badges = [];
    if(nd.grade) badges.push(gbadge(nd.grade));
    if(nd.score!=null) badges.push('<span class="gstat"><b>'+nd.score+'</b>score</span>');
    if(badges.length) h += '<div class="gh-badges">'+badges.join('')+'</div>';
    if(nd.role) h += '<div class="gh-role">role: '+esc(nd.role)+'</div>';
    if(nd.text) h += '<div class="gh-text">'+esc(nd.text)+'</div>';
    if(nd.date) h += '<div class="gh-date">'+esc(nd.date)+'</div>';
    if(nd.url) h += '<a class="gleaf" href="'+esc(nd.url)+'" target="_blank" rel="noopener">Open source ↗</a>';
    var outs = OUT[id]||[];
    if(outs.length){
      h += '<div class="gsec">Grounded in ('+outs.length+')</div>';
      outs.forEach(function(e){ var t=N[e.to]; if(!t) return;
        var inner = '<div class="ec"><div class="et">'+esc(tl(t.type))+'</div><div class="el">'+esc(t.label)+'</div><div class="ew">'+esc(e.why)+'</div></div>'
                  + (t.grade ? gbadge(t.grade) : '');
        // a grounding row pointing at an evidence leaf IS the source link — no empty drill-down hop
        if(!(OUT[e.to]||[]).length && t.url){
          h += '<a class="gedge" href="'+esc(t.url)+'" target="_blank" rel="noopener">'+inner+'<span class="echev">↗</span></a>';
        } else {
          h += '<div class="gedge" data-to="'+esc(e.to)+'">'+inner+'<span class="echev">›</span></div>';
        } });
    }
    document.getElementById('gbody').innerHTML = h;
  }
  function openNode(id){ if(!N[id]) return; stack=[id]; render(); document.body.classList.add('gopen'); }
  document.addEventListener('click', function(ev){
    var nav = ev.target.closest('[data-node]');
    if(nav){ openNode(nav.getAttribute('data-node')); return; }
    var edge = ev.target.closest('.gedge[data-to]');
    if(edge){ stack.push(edge.getAttribute('data-to')); render(); return; }
    var crumb = ev.target.closest('#gtrail a');
    if(crumb){ stack = stack.slice(0, +crumb.getAttribute('data-i')+1); render(); return; }
    if(ev.target.id==='gclose' || ev.target.id==='gscrim'){ document.body.classList.remove('gopen'); }
  });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') document.body.classList.remove('gopen'); });
})();
</script>
</body>
</html>
